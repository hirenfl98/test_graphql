contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: google_forms_to_hubspot_deals

apis:
  google_forms:
    name: "Google Forms API"
    version: v1
    base_url: "https://forms.googleapis.com"
    description: "Google Forms — form metadata and responses"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:35cf51ef-445b-4e7e-a15d-b85642e0ff45"

  hubspot:
    name: "HubSpot CRM API"
    version: v3
    base_url: "https://api.hubapi.com"
    description: "HubSpot CRM — Deals"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:263ed614-934e-48b0-a7d9-59ca4438ba60"

models:
  GoogleForm:
    description: "Form definition with questions"
    formId: string
    info:
      title: string
    items: array

  GoogleFormResponses:
    description: "List of form submissions"
    responses: array

  HubSpotDealCreate:
    description: "HubSpot Deal create payload"
    properties: object

  HubSpotDealResponse:
    description: "HubSpot Deal response"
    id: string
    properties: object

  HubSpotDealSearch:
    description: "HubSpot Deal search payload"
    filterGroups: array 

routes:
  get_form:
    api: google_forms
    description: "Get form structure (question titles → questionIds)"
    method: GET
    path: /v1/forms/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleForm

  fetch_form_responses:
    api: google_forms
    description: "Fetch all responses for a form"
    method: GET
    path: /v1/forms/{formId}/responses
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleFormResponses

  search_deal:
    api: hubspot
    description: "Search Deal by Deal Name"
    method: POST
    path: /crm/v3/objects/deals/search
    headers:
      Content-Type: application/json
    request:
      body: HubSpotDealSearch
    responses:
      200: HubSpotDealResponse

  create_deal:
    api: hubspot
    description: "Create Deal in HubSpot"
    method: POST
    path: /crm/v3/objects/deals
    headers:
      Content-Type: application/json
    request:
      body: HubSpotDealCreate
    responses:
      201: HubSpotDealResponse

flows:
  forms_to_hubspot:
    description: "Get form → fetch responses → upsert HubSpot Deals"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "1HAZgztYAy1bW6Ct1vuPqqQeywxL37snEGVC7X3Ln4Yw"

      - step: fetch
        action: fetch_form_responses
        inputs:
          formId: "1HAZgztYAy1bW6Ct1vuPqqQeywxL37snEGVC7X3Ln4Yw"

      - step: create
        action: create_deal
        for_each: fetch.response.body.responses
        as: item
        upsert:
          external_id: item.response.body.responseId
          search_action: search_deal
          search_inputs:
            filterGroups:
              - filters:
                  - propertyName: dealname
                    operator: EQ
                    value: "{item.response.body.answers.26364c8d.textAnswers.answers.0.value}"
          on_found: skip
          cache_scope: google_forms_to_hubspot_deals
        inputs:
          body:
            properties:
              dealname: "item.response.body.answers.26364c8d.textAnswers.answers.0.value"
              pipeline: "item.response.body.answers.6e818508.textAnswers.answers.0.value"
              dealstage: "item.response.body.answers.35a2a505.textAnswers.answers.0.value"
              amount: "item.response.body.answers.58491774.textAnswers.answers.0.value"
              closedate: "item.response.body.answers.03b4cd1e.textAnswers.answers.0.value"

tests:
  google_forms_to_hubspot_deals:
    description: "Sync Google Form responses to HubSpot Deals"
    execute: forms_to_hubspot
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.responses.0.responseId != null"