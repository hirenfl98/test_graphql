contract:
  format: apilabs.ai
  version: "1.0"
  type: apptalk-contract

run: google_forms_zoho_leads

apptalk:
  name: google_forms_zoho_leads_contract
  form_provider: google_forms
  form_auth_arn: arn:apilabs:secret:35cf51ef-445b-4e7e-a15d-b85642e0ff45
  form_id: "1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so"
  form_name: Lead Capture Form
  crm_provider: zoho
  crm_auth_arn: arn:apilabs:secret:7a88b682-39fb-41dc-a242-1e094b0b2af0
  crm_module: Leads
  cleanup: true
  mappings:
    - sourceLabel: First Name
      destFieldApiName: First_Name
    - sourceLabel: Last Name
      destFieldApiName: Last_Name
    - sourceLabel: Email
      destFieldApiName: Email
    - sourceLabel: Phone
      destFieldApiName: Phone
    - sourceLabel: Company
      destFieldApiName: Company
    - sourceLabel: City
      destFieldApiName: City

flows:
  e2e:
    steps:
      - step: validate
      - step: create_config
      - step: test_sync

tests:
  google_forms_zoho_leads:
    execute: e2e
    verify:
      - "test_sync.response.body.success == true"