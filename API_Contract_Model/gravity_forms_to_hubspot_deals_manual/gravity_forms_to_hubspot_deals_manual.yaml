contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: gravity_forms_to_hubspot_deals

apis:
  gravity_forms:
    name: "Gravity Forms API"
    version: v2
    base_url: "https://proactive-cod-76633b.gravitydemo.com"
    description: "Gravity Forms — Form metadata and entries"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:7c6de918-5460-4609-95b0-292b698c3566"

  hubspot:
    name: "HubSpot CRM API"
    version: v3
    base_url: "https://api.hubapi.com"
    description: "HubSpot CRM — Deals"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:263ed614-934e-48b0-a7d9-59ca4438ba60"

models:
  GravityForm:
    description: "Gravity Form definition"
    id: string
    title: string
    fields: array

  GravityEntries:
    description: "List of Gravity Form entries"
    entries: array

  HubSpotDealCreate:
    description: "HubSpot Deal create payload"
    properties: object

  HubSpotDealResponse:
    description: "HubSpot Deal response"
    id: string
    properties: object

  HubSpotDealSearch:
    description: "HubSpot Deal search payload"
    filterGroups: array

routes:
  get_form:
    api: gravity_forms
    description: "Get form definition"
    method: GET
    path: /wp-json/gf/v2/forms/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GravityForm

  fetch_entries:
    api: gravity_forms
    description: "Fetch form entries"
    method: GET
    path: /wp-json/gf/v2/forms/{formId}/entries
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GravityEntries

  search_deal:
    api: hubspot
    description: "Search Deal by Deal Name"
    method: POST
    path: /crm/v3/objects/deals/search
    headers:
      Content-Type: application/json
    request:
      body: HubSpotDealSearch
    responses:
      200: HubSpotDealResponse

  create_deal:
    api: hubspot
    description: "Create Deal in HubSpot"
    method: POST
    path: /crm/v3/objects/deals
    headers:
      Content-Type: application/json
    request:
      body: HubSpotDealCreate
    responses:
      201: HubSpotDealResponse

flows:
  forms_to_hubspot:
    description: "Get form → fetch entries → upsert HubSpot Deals"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "31"

      - step: fetch
        action: fetch_entries
        inputs:
          formId: "31"

      - step: create
        action: create_deal
        for_each: fetch.response.body.entries
        as: item
        upsert:
          external_id: item.response.body.id
          search_action: search_deal
          search_inputs:
            filterGroups:
              - filters:
                  - propertyName: dealname
                    operator: EQ
                    value: "{item.response.body.1}"
          on_found: skip
          cache_scope: gravity_forms_to_hubspot_deals
        inputs:
          body:
            properties:
              dealname: "item.response.body.1"
              pipeline: "item.response.body.3"
              dealstage: "item.response.body.4"
              amount: "item.response.body.5"
              closedate: "item.response.body.6"

tests:
  gravity_forms_to_hubspot_deals:
    description: "Sync Gravity Forms entries to HubSpot Deals"
    execute: forms_to_hubspot
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.entries.0.id != null"
