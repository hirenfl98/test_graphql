contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: jotform_to_bigin_products

apis:
  jotform:
    name: "Jotform API"
    version: v1
    base_url: "https://api.jotform.com"
    description: "Jotform — Form metadata and submissions"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:de271e3e-9bb6-4506-b554-3f5835643153"

  bigin:
    name: "Zoho Bigin API"
    version: v2
    base_url: "https://www.zohoapis.in"
    description: "Zoho Bigin — Products module"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:291caed0-0983-4711-a7a8-417ebd68f204"

models:
  Jotform:
    description: "Jotform form definition"
    id: string
    title: string
    questions: object

  JotformSubmissions:
    description: "List of form submissions"
    content: array

  BiginProductCreate:
    description: "Zoho Bigin Product create payload"
    data: array

  BiginProductResponse:
    description: "Zoho Bigin Product response"
    data: array

  BiginProductSearch:
    description: "Zoho Bigin Product search"
    criteria: string

routes:
  get_form:
    api: jotform
    description: "Get form definition"
    method: GET
    path: /form/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: Jotform

  fetch_submissions:
    api: jotform
    description: "Fetch form submissions"
    method: GET
    path: /form/{formId}/submissions
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: JotformSubmissions

  search_product:
    api: bigin
    description: "Search Product by Product Name"
    method: GET
    path: /bigin/v2/Products/search
    params:
      criteria:
        type: string
        in: query
        required: true
    responses:
      200: BiginProductResponse

  create_product:
    api: bigin
    description: "Create Product in Zoho Bigin"
    method: POST
    path: /bigin/v2/Products
    headers:
      Content-Type: application/json
    request:
      body: BiginProductCreate
    responses:
      201: BiginProductResponse

flows:
  forms_to_bigin:
    description: "Get form → fetch submissions → upsert Bigin Products"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "261723414363049"

      - step: fetch
        action: fetch_submissions
        inputs:
          formId: "261723414363049"

      - step: create
        action: create_product
        for_each: fetch.response.body.content
        as: item
        upsert:
          external_id: item.response.body.id
          search_action: search_product
          search_inputs:
            criteria: "(Product_Name:equals:{item.response.body.answers.3.answer})"
          on_found: skip
          cache_scope: jotform_to_bigin_products
        inputs:
          body:
            data:
              - Product_Name: "item.response.body.answers.3.answer"
                Product_Code: "item.response.body.answers.4.answer"
                Product_Category: "item.response.body.answers.5.answer"
                Unit_Price: "item.response.body.answers.6.answer"
                Description: "item.response.body.answers.7.answer"

tests:
  jotform_to_bigin_products:
    description: "Sync Jotform submissions to Zoho Bigin Products"
    execute: forms_to_bigin
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.content.0.id != null"