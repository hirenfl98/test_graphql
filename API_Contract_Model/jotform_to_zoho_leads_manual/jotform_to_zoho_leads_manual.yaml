contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: jotform_to_zoho_leads

apis:
  jotform:
    name: "Jotform API"
    version: v1
    base_url: "https://api.jotform.com"
    description: "Jotform — Form metadata and submissions"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:de271e3e-9bb6-4506-b554-3f5835643153"

  zoho_crm:
    name: "Zoho CRM API"
    version: v3
    base_url: "https://www.zohoapis.in"
    description: "Zoho CRM — Leads module"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:7a88b682-39fb-41dc-a242-1e094b0b2af0"

models:
  Jotform:
    description: "Jotform form definition"
    id: string
    title: string
    questions: object

  JotformSubmissions:
    description: "List of form submissions"
    content: array

  ZohoLeadCreate:
    description: "Zoho CRM lead create payload"
    data: array

  ZohoLeadResponse:
    description: "Zoho CRM lead response"
    data: array

  ZohoLeadSearch:
    description: "Zoho CRM lead search"
    criteria: string

routes:
  get_form:
    api: jotform
    description: "Get form definition"
    method: GET
    path: /form/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: Jotform

  fetch_submissions:
    api: jotform
    description: "Fetch form submissions"
    method: GET
    path: /form/{formId}/submissions
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: JotformSubmissions

  search_lead:
    api: zoho_crm
    description: "Search Lead by Email"
    method: GET
    path: /crm/v3/Leads/search
    params:
      criteria:
        type: string
        in: query
        required: true
    responses:
      200: ZohoLeadResponse

  create_lead:
    api: zoho_crm
    description: "Create Lead in Zoho CRM"
    method: POST
    path: /crm/v3/Leads
    headers:
      Content-Type: application/json
    request:
      body: ZohoLeadCreate
    responses:
      201: ZohoLeadResponse

flows:
  forms_to_crm:
    description: "Get form → fetch submissions → upsert Zoho Leads"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "261723020835046"

      - step: fetch
        action: fetch_submissions
        inputs:
          formId: "261723020835046"

      - step: create
        action: create_lead
        for_each: fetch.response.body.content
        as: item
        upsert:
          external_id: item.response.body.id
          search_action: search_lead
          search_inputs:
            criteria: "(Email:equals:{item.response.body.answers.4.answer})"
          on_found: skip
          cache_scope: jotform_to_zoho_leads
        inputs:
          body:
            data:
              - First_Name: "item.response.body.answers.2.answer"
                Last_Name: "item.response.body.answers.3.answer"
                Email: "item.response.body.answers.4.answer"
                Company: "item.response.body.answers.1.answer"
                Phone: "item.response.body.answers.5.answer"

tests:
  jotform_to_zoho_leads:
    description: "Sync Jotform submissions to Zoho CRM Leads"
    execute: forms_to_crm
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.content.0.id != null"