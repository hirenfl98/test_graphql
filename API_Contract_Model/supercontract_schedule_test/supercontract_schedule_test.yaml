contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: google_forms_to_zoho_leads

apis:
  google_forms:
    name: "Google Forms API"
    version: v1
    base_url: "https://forms.googleapis.com"
    description: "Google Forms — form metadata and responses"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:b4074fa5-7a8a-41d9-ba7f-d6fdd7fe9021"

  zoho_crm:
    name: "Zoho CRM API"
    version: v3
    base_url: "https://www.zohoapis.in"
    description: "Zoho CRM — Leads module"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:7a88b682-39fb-41dc-a242-1e094b0b2af0"

models:
  GoogleForm:
    description: "Form definition with questions"
    formId: string
    info:
      title: string
    items: array

  GoogleFormResponses:
    description: "List of form submissions"
    responses: array

  ZohoLeadCreate:
    description: "Zoho CRM lead create payload"
    data: array

  ZohoLeadResponse:
    description: "Zoho CRM create response"
    data: array

routes:
  get_form:
    api: google_forms
    description: "Get form structure (question titles → questionIds)"
    method: GET
    path: /v1/forms/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleForm

  fetch_form_responses:
    api: google_forms
    description: "Fetch all responses for a form"
    method: GET
    path: /v1/forms/{formId}/responses
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleFormResponses

  search_lead:
    api: zoho_crm
    description: "Search Lead by Email"
    method: GET
    path: /crm/v3/Leads/search
    params:
      criteria:
        type: string
        in: query
        required: true

  create_lead:
    api: zoho_crm
    description: "Create a Lead in Zoho CRM"
    method: POST
    path: /crm/v3/Leads
    headers:
      Content-Type: application/json
    request:
      body: ZohoLeadCreate
    responses:
      201: ZohoLeadResponse

flows:
  forms_to_crm:
    description: "Get form → fetch responses → upsert Zoho Leads"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so"

      - step: fetch
        action: fetch_form_responses
        inputs:
          formId: "1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so"

      - step: create
        action: create_lead
        for_each: fetch.response.body.responses
        as: item
        upsert:
          external_id: item.response.body.responseId
          search_action: search_lead
          search_inputs:
            criteria: "(Email:equals:{item.response.body.answers.169291c1.textAnswers.answers.0.value})"
          on_found: skip
          cache_scope: google_forms_to_zoho_leads
        inputs:
          body:
            data:
              - First_Name: "item.response.body.answers.1dd079ac.textAnswers.answers.0.value"
                Last_Name: "item.response.body.answers.15931833.textAnswers.answers.0.value"
                Email: "item.response.body.answers.169291c1.textAnswers.answers.0.value"
                Phone: "item.response.body.answers.2a739d0a.textAnswers.answers.0.value"
                Company: "item.response.body.answers.48b3a242.textAnswers.answers.0.value"
                City: "item.response.body.answers.24376c99.textAnswers.answers.0.value"

tests:
  google_forms_to_zoho_leads:
    description: "Sync Google Form responses to Zoho CRM Leads"
    execute: forms_to_crm
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.responses.0.responseId != null"