contract:
  format: apilabs.ai
  version: "1.0"
  type: api-contract

run: google_forms_to_zoho_leads

apis:
  google_forms:
    name: "Google Forms API"
    version: v1
    base_url: "https://forms.googleapis.com"
    description: "Google Forms — form metadata and responses"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:35cf51ef-445b-4e7e-a15d-b85642e0ff45"

  zoho_crm:
    name: "Zoho CRM API"
    version: v3
    base_url: "https://www.zohoapis.in"  # change region if needed (e.g. zohoapis.in)
    description: "Zoho CRM — Leads module"
    auth:
      type: bearer
      in: header
      secret_arn: "arn:apilabs:secret:7a88b682-39fb-41dc-a242-1e094b0b2af0"

models:
  GoogleForm:
    description: "Form definition with questions"
    formId: string
    info:
      title: string
    items: array

  GoogleFormResponses:
    description: "List of form submissions"
    responses: array

  ZohoLeadCreate:
    description: "Zoho CRM lead create payload"
    data: array

  ZohoLeadResponse:
    description: "Zoho CRM create response"
    data: array

routes:
  get_form:
    api: google_forms
    description: "Get form structure (question titles → questionIds)"
    method: GET
    path: /v1/forms/{formId}
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleForm

  fetch_form_responses:
    api: google_forms
    description: "Fetch all responses for a form"
    method: GET
    path: /v1/forms/{formId}/responses
    headers:
      Accept: application/json
    params:
      formId:
        type: string
        in: path
        required: true
    responses:
      200: GoogleFormResponses

  create_lead:
    api: zoho_crm
    description: "Create a Lead in Zoho CRM"
    method: POST
    path: /crm/v3/Leads
    headers:
      Content-Type: application/json
    request:
      body: ZohoLeadCreate
    responses:
      201: ZohoLeadResponse

flows:
  forms_to_crm:
    description: "Get form → fetch latest response → create Zoho Lead"
    steps:
      - step: get_form
        action: get_form
        inputs:
          formId: "1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so"   # e.g. 1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so

      - step: fetch
        action: fetch_form_responses
        inputs:
          formId: "1iu4BbU2o75rJVDir7gjq8DzhKjrjcWJU7Xc0iaC58so"

      - step: create
        action: create_lead
        inputs:
          body:
            data:
              - First_Name: "fetch.response.body.responses.0.answers.1dd079ac.textAnswers.answers.0.value"
                Last_Name: "fetch.response.body.responses.0.answers.15931833.textAnswers.answers.0.value"
                Email: "fetch.response.body.responses.0.answers.169291c1.textAnswers.answers.0.value"
                Phone: "fetch.response.body.responses.0.answers.2a739d0a.textAnswers.answers.0.value"
                Company: "fetch.response.body.responses.0.answers.48b3a242.textAnswers.answers.0.value"
                City: "fetch.response.body.responses.0.answers.24376c99.textAnswers.answers.0.value"

tests:
  google_forms_to_zoho_leads:
    description: "Sync latest Google Form response to Zoho Lead"
    execute: forms_to_crm
    expect:
      get_form: 200
      fetch: 200
      create: 201
    verify:
      - "fetch.response.body.responses.0.responseId != null"
      - "create.response.body.data.0.details.id != null"
